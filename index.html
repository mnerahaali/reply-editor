<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بُصر - محرر الردود</title>

<style>
body {
margin: 0;
font-family: Tahoma;
background: #f5f5f5;
}

.topbar {
background: white;
padding: 12px;
display: flex;
justify-content: space-between;
border-bottom: 1px solid #ddd;
}

button {
padding: 8px;
margin: 4px 0;
border-radius: 6px;
border: 1px solid #ccc;
cursor: pointer;
display: block;
width: 100%;
}

.layout {
display: flex;
}

.panel {
width: 40%;
background: white;
padding: 12px;
overflow-y: auto;
}

.output {
width: 60%;
padding: 12px;
}

#editor {
height: 85vh;
border: 1px solid #ccc;
padding: 10px;
background: white;
overflow-y: auto;
white-space: pre-wrap;
line-height: 2;
}

.active {
background: green;
color: white;
}
</style>
</head>

<body>

<div class="topbar">
<b>بُصر - محرر الردود</b>
<div>
<button onclick="copyAll()">نسخ</button>
<button onclick="clearEditor()">تفريغ</button>
<button onclick="removeLastLine()">حذف آخر سطر</button>
</div>
</div>

<div class="layout">

<div class="panel">

<h3>اختيار الاسم</h3>

<button onclick="setName(this,'منيرة عالي سرحان القرشي')">منيرة</button>
<button onclick="setName(this,'نورة البيشي')">نورة</button>
<button onclick="setName(this,'الجوهرة السحيم')">الجوهرة</button>

<hr>

<h3>الرسائل</h3>

<button onclick="setMsg(`*** السلام عليكم ورحمة الله وبركاته
الفرصة وُجِّهت للمسؤولة عن الإدخال أ. [الاسم]

ملاحظة: النموذج مُعبأ بخط اليد، لاحقًا في الفرص القادمة نأمل تعبئته إلكترونيًّا إن أمكن.
تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
خط اليد + توجيه
</button>

<button onclick="setMsg(`^^^ السلام عليكم ورحمة الله وبركاته
الفرصة وُجِّهت للمسؤول عن الإدخال أ. [الاسم]
لاحقًا نأمل إرسال الفرصة بصيغة PDF إن أمكن.
تحياتي
مسؤولة بريد الفرص التطوعية: منيرة القرشي`)">
PDF
</button>

<button onclick="setMsg(`∞ السلام عليكم ورحمة الله وبركاته
فضلاً إرسال الموقع الجغرافي إلى البريد الخاص بمنسق/ة الفرصة في
(قسم المسؤولية المجتمعية والعمل التطوعي) أ. [الاسم]
تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
الموقع
</button>

<button onclick="setMsg(`●*● السلام عليكم ورحمة الله وبركاته
تقريركم الخاص باليوم السعودي والعالمي للتطوع أُحيل إلى الموظفة المُختصَّة.
للتنويه حسب التوجيه الأخير؛ فهذا البريد مُعتمد حاليًا لاستقبال التقارير الختامية الخاصة باليوم السعودي والعالمي للتطوع بالإضافة إلى نماذج الفرص التطوعية.
أما بقية الشواهد والتقارير الخاصة بالفرص الأخرى فهي على مسارها المُعتاد تُرسل إلى بريد المنسقين والمنسقات في قسم المسؤولية المجتمعية والعمل التطوعي.
شكرًا لتعاونكم ..
تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
اليوم السعودي والعالمي للتطوع
</button>

<hr>

<h3>الخانات (للرسالة الذكية)</h3>

<button onclick="addField('اسم الجهة')">اسم الجهة</button>
<button onclick="addField('مشرف الفرصة')">مشرف</button>
<button onclick="addField('منسق الفرصة')">منسق</button>
<button onclick="addField('عدد المتطوعين')">عدد</button>
<button onclick="addField('العمر المناسب')">العمر</button>

<button onclick="smartMessage()">إنشاء رسالة ذكية</button>

</div>

<div class="output">
<div id="editor" contenteditable="true"></div>
</div>

</div>

<script>

let activeName = "";
let fields = [];

function setName(btn, name) {
activeName = name;

document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
btn.classList.add("active");
}

function applyName(text) {
if (!activeName) return text;

return text
.replace(/\[الاسم\]/g, activeName)
.replace(/\]الاسم\[/g, activeName);
}

function setMsg(text) {
document.getElementById("editor").innerText = applyName(text);
}

function addField(f) {
fields.push(f);
}

function smartMessage() {

let msg = "السلام عليكم ورحمة الله وبركاته\n\n";
msg += "نأمل تعبئة الخانات التالية:\n";

fields.forEach(f => {
msg += "●● خانة (" + f + ")\n";
});

msg += "\nلاحقًا نأمل منكم إرسال النموذج مكتمل البيانات.\n\n";
msg += "تحياتي\nمسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي";

document.getElementById("editor").innerText = msg;
}

function clearEditor(){
document.getElementById("editor").innerText="";
}

function removeLastLine(){
let txt = document.getElementById("editor").innerText.split("\n");
txt.pop();
document.getElementById("editor").innerText = txt.join("\n");
}

function copyAll(){
navigator.clipboard.writeText(document.getElementById("editor").innerText);
alert("تم النسخ");
}

</script>

</body>
</html>
