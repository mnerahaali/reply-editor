<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بُصر - محرر الردود</title>

<style>
body {
margin: 0;
font-family: Tahoma;
background: #f5f5f5;
}

.topbar {
background: white;
padding: 12px;
display: flex;
justify-content: space-between;
border-bottom: 1px solid #ddd;
}

.top-actions button {
padding: 6px 10px;
margin-left: 6px;
border: none;
background: green;
color: white;
border-radius: 6px;
cursor: pointer;
}

.layout {
display: flex;
}

.panel {
width: 45%;
background: white;
padding: 12px;
overflow-y: auto;
height: 90vh;
}

.output {
width: 55%;
padding: 12px;
}

#editor {
height: 85vh;
border: 1px solid #ccc;
padding: 10px;
background: white;
overflow-y: auto;
white-space: pre-wrap;
line-height: 2;
font-size: 16px;
}

button.small {
padding: 6px;
margin: 4px;
border-radius: 6px;
border: 1px solid #ccc;
cursor: pointer;
}

.active {
background: green;
color: white;
}
</style>
</head>

<body>

<div class="topbar">
<b>بُصر - محرر الردود</b>
<div class="top-actions">
<button onclick="copyAll()">نسخ</button>
<button onclick="clearEditor()">تفريغ</button>
<button onclick="removeLastLine()">حذف آخر سطر</button>
</div>
</div>

<div class="layout">

<div class="panel">

<h3>الأسماء</h3>
<button class="small" onclick="setName(this,'منيرة عالي سرحان القرشي')">منيرة</button>
<button class="small" onclick="setName(this,'نورة البيشي')">نورة</button>
<button class="small" onclick="setName(this,'الجوهرة السحيم')">الجوهرة</button>
<button class="small" onclick="setName(this,'شريفة الثمالي')">شريفة</button>

<hr>

<h3>الرسائل</h3>

<button class="small" onclick="setMsg(`*** السلام عليكم ورحمة الله وبركاته
الفرصة وُجِّهت للمسؤولة عن الإدخال أ. [الاسم]

ملاحظة: النموذج مُعبأ بخط اليد، لاحقًا في الفرص القادمة نأمل تعبئته إلكترونيًّا إن أمكن.

تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
خط اليد
</button>

<button class="small" onclick="setMsg(`●^● السلام عليكم ورحمة الله وبركاته
المُرفَق صُوِّر بلقطة شاشة لأن الصيغة المُرسلة غير مدعومة.

لاحقًا نأمل إرسال النموذج بصيغة PDF وإن تعذَّر فالصيغ التالية مدعومة
PNG, JPG, JPEG,

تحياتي
مسؤولة بريد الفرص التطوعية: منيرة القرشي`)">
لقطة شاشة
</button>

<button class="small" onclick="setMsg(`^^^ السلام عليكم ورحمة الله وبركاته
الفرصة وُجِّهت للمسؤولة عن الإدخال أ. [الاسم]

لاحقًا نأمل إرسال الفرصة بصيغة PDF إن أمكن.

تحياتي
مسؤولة بريد الفرص التطوعية: منيرة القرشي`)">
PDF
</button>

<button class="small" onclick="setMsg(`∞ السلام عليكم ورحمة الله وبركاته
فضلًا إرسال الموقع الجغرافي إلى البريد الخاص بمنسق/ة الفرصة أ. [الاسم]

تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
الموقع
</button>

<button class="small" onclick="setMsg(`~~~ السَّلام عليكم ورحمة الله وبركاته
حرصًا على ضمان وصول (نماذج الفرص التَّطوعية) إلى بريد قسم المسؤولية المجتمعية والعمل التطوعي دون أن تُصنَّف كرسائل Spam، نأمل منكم إضافة البريد الإلكتروني للقسم taifedugov@gmail.com في دفتر العناوين.

تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
إضافة البريد
</button>

<button class="small" onclick="setMsg(`●*● السلام عليكم ورحمة الله وبركاته
تقريركم الخاص باليوم السعودي والعالمي للتطوع وصل وأُحيلَ للموظفة المختصة.

تحياتي
مسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي`)">
التقرير
</button>

<hr>

<h3>الخانات</h3>

<button class="small" onclick="addField('اسم الجهة')">اسم الجهة</button>
<button class="small" onclick="addField('مشرف الفرصة')">مشرف</button>
<button class="small" onclick="addField('منسق الفرصة')">منسق</button>
<button class="small" onclick="addField('عدد المتطوعين')">عدد</button>
<button class="small" onclick="addField('العمر المناسب')">العمر</button>

<button class="small" onclick="smartMessage()">إنشاء رسالة</button>

</div>

<div class="output">
<div id="editor" contenteditable="true"></div>
</div>

</div>

<script>

let name = "";
let fields = [];

function setName(btn, n) {
name = n;
document.querySelectorAll(".panel button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function applyName(text) {
return text.replace(/\[الاسم\]/g, name);
}

function setMsg(text) {
document.getElementById("editor").innerText = applyName(text);
}

function addField(field) {
fields.push(field);
}

function smartMessage() {

let msg = "السلام عليكم ورحمة الله وبركاته\n\n";
msg += "نأمل تعبئة الخانات التالية:\n";

fields.forEach(f => {
msg += "●● خانة (" + f + ")\n";
});

msg += "\nلاحقًا نأمل منكم إرسال النموذج مكتمل البيانات.\n\n";
msg += "تحياتي\nمسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي";

document.getElementById("editor").innerText = msg;
}

function clearEditor(){
document.getElementById("editor").innerText="";
}

function removeLastLine(){
let txt = document.getElementById("editor").innerText.split("\n");
txt.pop();
document.getElementById("editor").innerText = txt.join("\n");
}

function copyAll(){
navigator.clipboard.writeText(document.getElementById("editor").innerText);
alert("تم النسخ");
}

</script>

</body>
</html>
