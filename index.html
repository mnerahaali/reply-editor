<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />

<title>بُصر - محرر الردود</title>

<style>
* { box-sizing: border-box; }

body {
margin: 0;
font-family: Tahoma, Arial, sans-serif;
background: #f5f5f5;
color: #222;
}

.topbar {
background: #fff;
border-bottom: 1px solid #ddd;
padding: 14px 18px;
display: flex;
justify-content: space-between;
align-items: center;
gap: 10px;
flex-wrap: wrap;
}

.topbar h1 {
margin: 0;
font-size: 24px;
}

.top-actions {
display: flex;
flex-wrap: wrap;
gap: 8px;
}

.top-actions button {
padding: 8px 12px;
border: none;
background: #188c2f;
color: #fff;
border-radius: 8px;
cursor: pointer;
font-size: 14px;
}

.top-actions button:hover {
background: #146f26;
}

.layout {
display: flex;
min-height: calc(100vh - 70px);
}

.builder-panel {
width: 46%;
background: #fff;
border-left: 1px solid #ddd;
padding: 16px;
overflow-y: auto;
}

.output-panel {
width: 54%;
padding: 16px;
display: flex;
flex-direction: column;
}

.panel-group {
margin-bottom: 22px;
}

.panel-group h2 {
margin: 0 0 10px;
font-size: 18px;
border-bottom: 1px solid #ddd;
padding-bottom: 6px;
}

.button-grid,
.names-row {
display: flex;
flex-wrap: wrap;
gap: 8px;
align-items: center;
}

.button-grid button,
.name-btn {
padding: 8px 10px;
border: 1px solid #cfcfcf;
background: #fafafa;
border-radius: 8px;
cursor: pointer;
font-size: 14px;
line-height: 1.5;
}

.button-grid button:hover,
.name-btn:hover {
background: #efefef;
}

.name-btn.active {
background: #188c2f !important;
color: #fff;
border-color: #188c2f;
}

.note {
font-size: 13px;
color: #666;
margin-top: 8px;
}

.output-card {
background: #fff;
border: 1px solid #ddd;
border-radius: 10px;
padding: 12px;
height: 100%;
display: flex;
flex-direction: column;
}

.output-card strong {
display: block;
margin-bottom: 10px;
font-size: 18px;
}

#editor {
width: 100%;
flex: 1;
min-height: 780px;
border: 1px solid #d5d5d5;
border-radius: 10px;
padding: 14px;
background: #fff;
overflow-y: auto;
line-height: 2;
font-size: 18px;
white-space: pre-wrap;
word-break: break-word;
outline: none;
}

.green-line {
color: #1f7a1f;
font-weight: 700;
}

@media (max-width: 950px) {
.layout {
flex-direction: column;
}

.builder-panel,
.output-panel {
width: 100%;
}

#editor {
min-height: 420px;
}
}
</style>
</head>

<script>
let activeName = '';

function getEditor() {
return document.getElementById('editor');
}

function escapeHtml(text) {
return text
.replace(/&/g, '&amp;')
.replace(/</g, '&lt;')
.replace(/>/g, '&gt;');
}

function applySelectedName(text) {
if (!activeName) return text;
return text.replace(/أ\.\s*/g, `أ. ${activeName} `);
}

function lineClass(line) {
const t = line.trim();
if (t.includes('السلام عليكم ورحمة الله وبركاته')) return 'green-line';
if (t === 'تحياتي') return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التطوعية')) return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التطوعيَّة')) return 'green-line';
return '';
}

function textToHtml(multilineText) {
const text = applySelectedName(multilineText);
const lines = text.split('\n');
return lines.map(line => {
if (line === '') return '<div><br></div>';
const cls = lineClass(line);
return `<div class="${cls}">${escapeHtml(line)}</div>`;
}).join('');
}

function setFullMessage(text) {
const editor = getEditor();
editor.innerHTML = textToHtml(text);
placeCursorAtEnd();
}

function insertLine(text) {
insertHtmlAtCursor(textToHtml(text + '\n'));
}

function insertOpening() {
insertHtmlAtCursor(textToHtml('السلام عليكم ورحمة الله وبركاته\n'));
}

function insertClosing() {
insertHtmlAtCursor(textToHtml('تحياتي\nمسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي\n'));
}

function insertHtmlAtCursor(html) {
const editor = getEditor();
editor.focus();

const selection = window.getSelection();
if (!selection.rangeCount) {
editor.innerHTML += html;
placeCursorAtEnd();
return;
}

const range = selection.getRangeAt(0);
range.deleteContents();

const temp = document.createElement('div');
temp.innerHTML = html;

const fragment = document.createDocumentFragment();
let node;
let lastNode = null;

while ((node = temp.firstChild)) {
lastNode = fragment.appendChild(node);
}

range.insertNode(fragment);

if (lastNode) {
range.setStartAfter(lastNode);
range.collapse(true);
selection.removeAllRanges();
selection.addRange(range);
}
}

function placeCursorAtEnd() {
const editor = getEditor();
editor.focus();
const selection = window.getSelection();
const range = document.createRange();
range.selectNodeContents(editor);
range.collapse(false);
selection.removeAllRanges();
selection.addRange(range);
}

function setActiveName(button, name) {
activeName = name;
document.querySelectorAll('.name-btn').forEach(btn => btn.classList.remove('active'));
button.classList.add('active');
}

function clearEditor() {
getEditor().innerHTML = '';
getEditor().focus();
}

function removeLastLine() {
const editor = getEditor();
const children = Array.from(editor.childNodes);

for (let i = children.length - 1; i >= 0; i--) {
const node = children[i];
const text = node.textContent.replace(/\u00A0/g, ' ').trim();
editor.removeChild(node);
if (text !== '' || node.innerHTML === '<br>') {
break;
}
}
placeCursorAtEnd();
}

function copyAll() {
const editor = getEditor();
editor.focus();

const selection = window.getSelection();
const range = document.createRange();
range.selectNodeContents(editor);
selection.removeAllRanges();
selection.addRange(range);

let copied = false;
try {
copied = document.execCommand('copy');
} catch (e) {
copied = false;
}

selection.removeAllRanges();

if (copied) {
alert('تم النسخ');
} else {
navigator.clipboard.writeText(editor.innerText)
.then(() => alert('تم النسخ'))
.catch(() => alert('تعذر النسخ، انسخي يدويًا'));
}
}
</script>
