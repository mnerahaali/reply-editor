.output-card {

<script>
let activeName = '';

function getEditor() {
return document.getElementById('editor');
}

function escapeHtml(text) {
return text
.replace(/&/g, '&amp;')
.replace(/</g, '&lt;')
.replace(/>/g, '&gt;');
}

function applySelectedName(text) {
if (!activeName) return text;
return text
.replace(/\[الاسم\]/g, activeName)
.replace(/\]الاسم\[/g, activeName);
}

function lineClass(line) {
const t = line.trim();
if (t.includes('السلام عليكم ورحمة الله وبركاته')) return 'green-line';
if (t.includes('السَّلام عليكم ورحمة الله وبركاته')) return 'green-line';
if (t === 'تحياتي') return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التطوعية')) return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التَّطوعية')) return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التطوعيَّة')) return 'green-line';
return '';
}

function textToHtml(multilineText) {
const text = applySelectedName(multilineText);
const lines = text.split('\n');
return lines.map(line => {
if (line === '') return '<div><br></div>';
const cls = lineClass(line);
return `<div class="${cls}">${escapeHtml(line)}</div>`;
}).join('');
}

function setFullMessage(text) {
getEditor().innerHTML = textToHtml(text);
placeCursorAtEnd();
}

function insertLine(text) {
insertHtmlAtCursor(textToHtml(text + '\n'));
}

function insertOpening() {
insertHtmlAtCursor(textToHtml('السلام عليكم ورحمة الله وبركاته\n'));
}

function insertClosing() {
insertHtmlAtCursor(textToHtml('تحياتي\nمسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي\n'));
}

function insertHtmlAtCursor(html) {
const editor = getEditor();
editor.focus();

const selection = window.getSelection();
if (!selection.rangeCount) {
editor.innerHTML += html;
placeCursorAtEnd();
return;
}

const range = selection.getRangeAt(0);
range.deleteContents();

const temp = document.createElement('div');
temp.innerHTML = html;

const fragment = document.createDocumentFragment();
let node;
let lastNode = null;

while ((node = temp.firstChild)) {
lastNode = fragment.appendChild(node);
}

range.insertNode(fragment);

if (lastNode) {
range.setStartAfter(lastNode);
range.collapse(true);
selection.removeAllRanges();
selection.addRange(range);
}
}

function placeCursorAtEnd() {
const editor = getEditor();
editor.focus();
const selection = window.getSelection();
const range = document.createRange();
range.selectNodeContents(editor);
range.collapse(false);
selection.removeAllRanges();
selection.addRange(range);
}

function setName(button, name) {
activeName = name;
document.querySelectorAll('.names-grid button').forEach(btn => btn.classList.remove('active'));
button.classList.add('active');
}

function clearEditor() {
getEditor().innerHTML = '';
getEditor().focus();
}

function removeLastLine() {
const editor = getEditor();
const children = Array.from(editor.childNodes);

for (let i = children.length - 1; i >= 0; i--) {
const node = children[i];
const text = node.textContent.replace(/\u00A0/g, ' ').trim();
editor.removeChild(node);
if (text !== '' || node.innerHTML === '<br>') {
break;
}
}
placeCursorAtEnd();
}

function copyAll() {
const editor = getEditor();
editor.focus();

const selection = window.getSelection();
const range = document.createRange();
range.selectNodeContents(editor);
selection.removeAllRanges();
selection.addRange(range);

let copied = false;
try {
copied = document.execCommand('copy');
} catch (e) {
copied = false;
}

selection.removeAllRanges();

if (copied) {
alert('تم النسخ');
} else {
navigator.clipboard.writeText(editor.innerText)
.then(() => alert('تم النسخ'))
.catch(() => alert('تعذر النسخ، انسخي يدويًا'));
}
}
</script>
