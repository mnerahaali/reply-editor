<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرر الردود</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
.container {display:flex; height:100vh;}
.left {width:45%; background:#fff; padding:15px; overflow:auto;}
.right {width:55%; padding:15px;}

h3 {margin-top:20px;}

button {
margin:4px;
padding:6px 10px;
cursor:pointer;
border-radius:6px;
border:1px solid #ccc;
background:#fafafa;
}

button:hover {background:#eee;}

.symbols button {font-weight:bold;}

textarea {
width:100%;
height:500px;
font-size:16px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.top {
display:flex;
gap:8px;
margin-bottom:10px;
}

.top button {
background:#4caf50;
color:#fff;
border:none;
}

.active {background:#4caf50 !important; color:#fff;}

.note {font-size:12px; color:#777;}
</style>
</head>

<body>

<div class="top">
<button onclick="copyAll()">نسخ</button>
<button onclick="newMsg()">رسالة جديدة</button>
<button onclick="clearMiddle()">مسح المتن</button>
<button onclick="removeLast()">حذف آخر سطر</button>
</div>

<div class="container">

<div class="left">

<h3>الرموز</h3>
<div class="symbols">
<button title="فاصل" onclick="addSymbol('/')">/</button>
<button title="بدون توقيع" onclick="addSymbol('●')">●</button>
<button title="نقص معلومة" onclick="addSymbol('●●')">●●</button>
<button title="لا يوجد مرفق" onclick="addSymbol('●●●')">●●●</button>
<button title="خطأ" onclick="addSymbol('@')">@</button>
<button title="الفرص فقط" onclick="addSymbol('#')">#</button>
<button onclick="addSymbol('&&&&')">&&&&</button>
<button onclick="addSymbol('%%%')">%%%</button>
<button onclick="addSymbol('PDF')">PDF</button>
<button onclick="addSymbol('^^^')">^^^</button>
<button onclick="addSymbol('~~~')">~~~</button>
<button onclick="addSymbol('∞')">∞</button>
<button onclick="addSymbol('>>>')">&gt;&gt;&gt;</button>
</div>
<div class="note">عند تمرير المؤشر على الرمز يظهر ما يشير إليه.</div>

<h3>الأسماء</h3>
<div>
<button onclick="setName(this,'الجوهرة السحيم')">الجوهرة السحيم</button>
<button onclick="setName(this,'منيرة الناصري')">منيرة الناصري</button>
<button onclick="setName(this,'نورة البيشي')">نورة البيشي</button>
<button onclick="setName(this,'شريفة الثمالي')">شريفة الثمالي</button>
<button onclick="setName(this,'عهود حلواني')">عهود حلواني</button>
<button onclick="setName(this,'بدرية الثمالي')">بدرية الثمالي</button>
<button onclick="setName(this,'نايف الزهراني')">نايف الزهراني</button>
<button onclick="setName(this,'منيرة عالي سرحان القرشي')">منيرة عالي سرحان القرشي</button>
</div>

<h3>نصوص جاهزة</h3>

<button onclick="addText(`فضلاً ختم الفرصة التطوعية، أو إدراج توقيع مدير/ ة المدرسة في حال عدم توفر ختم.`)">
ختم أو توقيع</button>

<button onclick="addText(`النموذج مُعبأ بخط اليد، نأمل تعبئته إلكترونيًّا وإعادة إرساله.`)">
تعبئة إلكترونيًا</button>

<button onclick="addText(`يبدو أن هذه الرسالة مُوجَّهة إلى قسم آخر.`)">
موجهة لقسم آخر</button>

<button onclick="addText(`هذا البريد مُخصص لنماذج الفرص التطوعية فقط.`)">
البريد مخصص</button>

<button onclick="addText(`الرسالة لا تحتوي على مرفقات.`)">
لا يوجد مرفق</button>

<button onclick="addText(`المرفق غير واضح.`)">
المرفق غير واضح</button>

<button onclick="addText(`نأمل إرسال النموذج بصيغة PDF إن أمكن.`)">
PDF إن أمكن</button>

<button onclick="addText(`أي تعديلات تُرسل إلى المنسقة أ. [الاسم].`)">
إدراج اسم</button>

<h3>الخانات التالية</h3>

<button onclick="addText(`•• خانة عدد المتطوعين`)">عدد المتطوعين</button>
<button onclick="addText(`•• خانة المهام المطلوبة`)">المهام</button>
<button onclick="addText(`•• خانة اسم الجهة`)">اسم الجهة</button>
<button onclick="addText(`•• خانة موقع الفرصة التطوعية`)">الموقع</button>
<button onclick="addText(`•• خانة الأيام المتاحة`)">الأيام</button>

</div>

<div class="right">

<div id="symbolsBox"></div>

<textarea id="box"></textarea>

</div>

</div>

<script>

let name="";

function setName(btn,n){
name=n;
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function addSymbol(s){
document.getElementById("symbolsBox").innerText+=s;
}

function addText(t){
if(t.includes("[الاسم]")){
if(!name){alert("اختاري الاسم");return;}
t=t.replace("[الاسم]",name);
}
document.getElementById("box").value+=t+"\n";
}

function newMsg(){
document.getElementById("box").value=
"السلام عليكم ورحمة الله وبركاته\n\n\nتحياتي\nمسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي";
}

function clearMiddle(){
newMsg();
}

function removeLast(){
let v=document.getElementById("box").value.split("\n");
v.pop();
document.getElementById("box").value=v.join("\n");
}

function copyAll(){
let s=document.getElementById("symbolsBox").innerText;
let b=document.getElementById("box").value;
navigator.clipboard.writeText(s+"\n\n"+b);
alert("تم النسخ");
}

</script>

</body>
</html>
