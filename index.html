<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Tahoma, Arial, sans-serif;
background: #f5f5f5;
color: #222;
}

.topbar {
background: white;
padding: 12px 16px;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 1px solid #ddd;
gap: 10px;
flex-wrap: wrap;
}

.topbar-title {
font-size: 24px;
font-weight: bold;
}

.top-actions {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.top-actions button {
padding: 8px 12px;
border: none;
background: green;
color: white;
border-radius: 6px;
cursor: pointer;
font-size: 14px;
width: auto;
}

.layout {
display: flex;
flex-direction: row;
min-height: calc(100vh - 70px);
}

.panel {
width: 42%;
background: white;
padding: 12px;
overflow-y: auto;
border-left: 1px solid #ddd;
}

.output {
width: 58%;
padding: 12px;
}

.section {
margin-bottom: 22px;
}

.section h3 {
margin: 0 0 10px;
font-size: 26px;
border-bottom: 1px solid #ddd;
padding-bottom: 6px;
}

.sub-title {
margin: 10px 0 6px;
font-size: 14px;
color: #555;
}

.button-grid,
.names-grid {
display: flex;
flex-wrap: wrap;
gap: 8px;
}

.small {
padding: 6px 10px;
border-radius: 6px;
border: 1px solid #ccc;
cursor: pointer;
background: #fafafa;
width: auto;
font-size: 14px;
}

.small:hover {
background: #eee;
}

.active {
background: green !important;
color: white;
}

.output-card {
background: white;
border: 1px solid #ddd;
border-radius: 10px;
padding: 12px;
min-height: 85vh;
}

.output-card-title {
font-size: 22px;
font-weight: bold;
margin-bottom: 10px;
}

#editor {
min-height: 78vh;
border: 1px solid #ccc;
padding: 12px;
background: white;
overflow-y: auto;
white-space: pre-wrap;
word-break: break-word;
line-height: 2;
font-size: 17px;
outline: none;
}

.green-line {
color: green;
font-weight: bold;
}

.note {
font-size: 13px;
color: #666;
margin-top: 6px;
}

@media (max-width: 900px) {
.layout {
flex-direction: column;
}

.panel,
.output {
width: 100%;
}

.output-card {
min-height: auto;
}

#editor {
min-height: 420px;
}
}
</style>
</head>

<script>
let activeName = '';

function getEditor() {
return document.getElementById('editor');
}

function escapeHtml(text) {
return text
.replace(/&/g, '&amp;')
.replace(/</g, '&lt;')
.replace(/>/g, '&gt;');
}

function applySelectedName(text) {
if (!activeName) return text;
return text
.replace(/\[الاسم\]/g, activeName)
.replace(/\]الاسم\[/g, activeName);
}

function lineClass(line) {
const t = line.trim();
if (t.includes('السلام عليكم ورحمة الله وبركاته')) return 'green-line';
if (t.includes('السَّلام عليكم ورحمة الله وبركاته')) return 'green-line';
if (t === 'تحياتي') return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التطوعية')) return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التَّطوعية')) return 'green-line';
if (t.startsWith('مسؤولة بريد الفرص التطوعيَّة')) return 'green-line';
return '';
}

function textToHtml(multilineText) {
const text = applySelectedName(multilineText);
const lines = text.split('\n');
return lines.map(line => {
if (line === '') return '<div><br></div>';
const cls = lineClass(line);
return `<div class="${cls}">${escapeHtml(line)}</div>`;
}).join('');
}

function setFullMessage(text) {
getEditor().innerHTML = textToHtml(text);
placeCursorAtEnd();
}

function insertLine(text) {
insertHtmlAtCursor(textToHtml(text + '\n'));
}

function insertOpening() {
insertHtmlAtCursor(textToHtml('السلام عليكم ورحمة الله وبركاته\n'));
}

function insertClosing() {
insertHtmlAtCursor(textToHtml('تحياتي\nمسؤولة بريد الفرص التطوعية: منيرة عالي سرحان القرشي\n'));
}

function insertHtmlAtCursor(html) {
const editor = getEditor();
editor.focus();

const selection = window.getSelection();
if (!selection.rangeCount) {
editor.innerHTML += html;
placeCursorAtEnd();
return;
}

const range = selection.getRangeAt(0);
range.deleteContents();

const temp = document.createElement('div');
temp.innerHTML = html;

const fragment = document.createDocumentFragment();
let node;
let lastNode = null;

while ((node = temp.firstChild)) {
lastNode = fragment.appendChild(node);
}

range.insertNode(fragment);

if (lastNode) {
range.setStartAfter(lastNode);
range.collapse(true);
selection.removeAllRanges();
selection.addRange(range);
}
}

function placeCursorAtEnd() {
const editor = getEditor();
editor.focus();
const selection = window.getSelection();
const range = document.createRange();
range.selectNodeContents(editor);
range.collapse(false);
selection.removeAllRanges();
selection.addRange(range);
}

function setName(button, name) {
activeName = name;
document.querySelectorAll('.names-grid button').forEach(btn => btn.classList.remove('active'));
button.classList.add('active');
}

function clearEditor() {
getEditor().innerHTML = '';
getEditor().focus();
}

function removeLastLine() {
const editor = getEditor();
const children = Array.from(editor.childNodes);

for (let i = children.length - 1; i >= 0; i--) {
const node = children[i];
const text = node.textContent.replace(/\u00A0/g, ' ').trim();
editor.removeChild(node);
if (text !== '' || node.innerHTML === '<br>') {
break;
}
}
placeCursorAtEnd();
}

function copyAll() {
const editor = getEditor();
editor.focus();

const selection = window.getSelection();
const range = document.createRange();
range.selectNodeContents(editor);
selection.removeAllRanges();
selection.addRange(range);

let copied = false;
try {
copied = document.execCommand('copy');
} catch (e) {
copied = false;
}

selection.removeAllRanges();

if (copied) {
alert('تم النسخ');
} else {
navigator.clipboard.writeText(editor.innerText)
.then(() => alert('تم النسخ'))
.catch(() => alert('تعذر النسخ، انسخي يدويًا'));
}
}
</script>
