<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بُصر - محرر الردود</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      direction: rtl;
      color: #222;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-actions button {
      padding: 8px 12px;
      border: none;
      background: #4caf50;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .top-actions button:hover {
      background: #3f9843;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 62px);
    }

    .builder-panel {
      width: 46%;
      background: #fff;
      border-left: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
    }

    .output-panel {
      width: 54%;
      padding: 16px;
      box-sizing: border-box;
    }

    .panel-group {
      margin-bottom: 22px;
    }

    .panel-group h2 {
      margin: 0 0 10px;
      font-size: 18px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .button-grid button {
      padding: 8px 10px;
      border: 1px solid #ccc;
      background: #fafafa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.4;
    }

    .button-grid button:hover {
      background: #eee;
    }

    .symbols-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .symbol-btn {
      min-width: 42px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      background: #fafafa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .symbol-btn:hover {
      background: #eee;
    }

    .output-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      box-sizing: border-box;
    }

    .output-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: 20px;
    }

    textarea {
      width: 100%;
      min-height: 520px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      resize: vertical;
      font-size: 18px;
      line-height: 1.8;
      box-sizing: border-box;
      direction: rtl;
      font-family: Arial, sans-serif;
    }

    .note {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .builder-panel,
      .output-panel {
        width: 100%;
      }

      textarea {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <h1>بُصر - محرر الردود</h1>

    <div class="top-actions">
      <button onclick="copyAll()">نسخ الكل</button>
      <button onclick="clearAll()">تفريغ</button>
      <button onclick="removeLastLine()">حذف آخر سطر</button>
    </div>
  </header>

  <main class="layout">

    <section class="builder-panel">

      <div class="panel-group">
        <h2>الرموز</h2>

        <div class="symbols-row">
          <button class="symbol-btn" title="فاصل بين رمز ورمز" onclick="addText('/')">/</button>
          <button class="symbol-btn" title="عدم وجود توقيع أو ختم" onclick="addText('●')">●</button>
          <button class="symbol-btn" title="نقص معلومة مهمة" onclick="addText('●●')">●●</button>
          <button class="symbol-btn" title="عدم وجود مرفق أو صيغة المرفق لا تعمل" onclick="addText('●●●')">●●●</button>
          <button class="symbol-btn" title="رسالة وصلت بالخطأ" onclick="addText('@')">@</button>
          <button class="symbol-btn" title="هذا البريد مخصص لنماذج الفرص التطوعية فقط" onclick="addText('#')">#</button>
          <button class="symbol-btn" title="أُرسلت سابقًا" onclick="addText('&&&&')">&&&&</button>
          <button class="symbol-btn" title="فرص المدارس الأهلية" onclick="addText('%%%')">%%%</button>
          <button class="symbol-btn" title="صيغة PDF" onclick="addText('PDF')">PDF</button>
          <button class="symbol-btn" title="المرفق بصيغة غير مناسبة أو المطلوب PDF" onclick="addText('^^^')">^^^</button>
          <button class="symbol-btn" title="إضافة عنوان البريد في جهات الاتصال" onclick="addText('~~~')">~~~</button>
          <button class="symbol-btn" title="إرسال الموقع الجغرافي للمنسقة" onclick="addText('∞')">∞</button>
          <button class="symbol-btn" title="تصويب معلومة" onclick="addText('>>>')">&gt;&gt;&gt;</button>
        </div>

        <div class="note">مرري المؤشر على الرمز لقراءة معناه، واضغطيه لإدراجه في النص.</div>
      </div>

      <div class="panel-group">
        <h2>بداية الرد</h2>
        <div class="button-grid">
          <button onclick="addText('السلام عليكم ورحمة الله وبركاته')">السلام عليكم ورحمة الله وبركاته</button>
        </div>
      </div>

      <div class="panel-group">
        <h2>عبارات عامة</h2>
        <div class="button-grid">
          <button onclick="addText('نأمل إدراج ختم المدرسة أو توقيع مدير/ة المدرسة.')">نأمل إدراج ختم المدرسة أو توقيع مدير/ة المدرسة</button>
          <button onclick="addText('نأمل تعبئة الخانات الناقصة.')">نأمل تعبئة الخانات الناقصة</button>
          <button onclick="addText('الخانة الناقصة:')">الخانة الناقصة:</button>
          <button onclick="addText('الخانات الناقصة:')">الخانات الناقصة:</button>
          <button onclick="addText('يبدو أن هذه الرسالة موجهة إلى قسم آخر.')">يبدو أن هذه الرسالة موجهة إلى قسم آخر</button>
          <button onclick="addText('هذا البريد مخصص لنماذج الفرص التطوعية فقط.')">هذا البريد مخصص لنماذج الفرص التطوعية فقط</button>
          <button onclick="addText('الرجاء عدم تكرار إرسال الفرص التطوعية.')">الرجاء عدم تكرار إرسال الفرص التطوعية</button>
          <button onclick="addText('نأمل إرسال النموذج بصيغة PDF.')">نأمل إرسال النموذج بصيغة PDF</button>
          <button onclick="addText('الرسالة لا تحتوي على مرفقات.')">الرسالة لا تحتوي على مرفقات</button>
          <button onclick="addText('المرفق غير واضح.')">المرفق غير واضح</button>
          <button onclick="addText('الملف المرفق لا يعمل.')">الملف المرفق لا يعمل</button>
          <button onclick="addText('نأمل تعبئة النموذج إلكترونيًا إن أمكن.')">نأمل تعبئة النموذج إلكترونيًا إن أمكن</button>
          <button onclick="addText('الفرصة وُجّهت للمسؤولة عن الإدخال.')">الفرصة وُجّهت للمسؤولة عن الإدخال</button>
          <button onclick="addText('أي تعديلات تُرسل إلى المنسقة المتواصلة مع مدرستكم.')">أي تعديلات تُرسل إلى المنسقة المتواصلة مع مدرستكم</button>
        </div>
      </div>

      <div class="panel-group">
        <h2>الخانات الناقصة</h2>
        <div class="button-grid">
          <button onclick="addText('- خانة اسم الجهة بكتابة اسم المدرسة')">اسم الجهة</button>
          <button onclick="addText('- خانة مشرف الفرصة بكتابة اسم المنسق/ة في المدرسة ورقم الجوال')">مشرف الفرصة</button>
          <button onclick="addText('- خانة منسق الفرصة بكتابة اسم المنسق/ة في قسم المسؤولية المجتمعية والعمل التطوعي')">منسق الفرصة</button>
          <button onclick="addText('- خانة عدد المتطوعين بكتابة العدد')">عدد المتطوعين</button>
          <button onclick="addText('- خانة العمر المناسب للمتطوعين باختيار العمر')">العمر المناسب</button>
          <button onclick="addText('- خانة المهام المطلوبة من المتطوع بكتابة 3 مهام كحد أدنى')">المهام المطلوبة</button>
          <button onclick="addText('- خانة طبيعة الفرصة ووقتها ص / م')">طبيعة الفرصة</button>
          <button onclick="addText('- خانة عدد الساعات في اليوم')">عدد الساعات</button>
          <button onclick="addText('- خانة موقع الفرصة التطوعية')">موقع الفرصة</button>
          <button onclick="addText('- خانة الأيام المتاحة للفرصة')">الأيام المتاحة</button>
          <button onclick="addText('- خانة الإطار الزمني للفرصة - ميلادي')">الإطار الزمني</button>
        </div>
      </div>

      <div class="panel-group">
        <h2>الختام</h2>
        <div class="button-grid">
          <button onclick="addText('تحياتي')">تحياتي</button>
          <button onclick="addText('مسؤولة بريد الفرص التطوعية:')">مسؤولة بريد الفرص التطوعية:</button>
          <button onclick="addText('منسقة الفرص التطوعية')">منسقة الفرص التطوعية</button>
        </div>
      </div>

    </section>

    <section class="output-panel">
      <div class="output-card">
        <strong>الناتج</strong>
        <textarea id="replyBox" placeholder="سيظهر النص هنا..."></textarea>
      </div>
    </section>

  </main>

  <script>
    function addText(text) {
      const box = document.getElementById('replyBox');
      box.value += text + "\n";
    }

    function clearAll() {
      document.getElementById('replyBox').value = '';
    }

    function removeLastLine() {
      const box = document.getElementById('replyBox');
      let lines = box.value.split('\n');

      while (lines.length && lines[lines.length - 1] === '') {
        lines.pop();
      }

      lines.pop();
      box.value = lines.join('\n');

      if (box.value.trim() !== '') {
        box.value += '\n';
      }
    }

    function copyAll() {
      const box = document.getElementById('replyBox');
      box.select();
      box.setSelectionRange(0, 99999);
      document.execCommand('copy');
      alert('تم نسخ النص');
    }
  </script>

</body>
</html>
